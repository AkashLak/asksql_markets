services:
  - type: web
    name: asksql-markets-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_DOWNLOAD_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
