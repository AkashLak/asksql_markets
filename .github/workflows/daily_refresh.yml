name: Daily Market Data Refresh

on:
  schedule:
    # 9 PM UTC = 5 PM ET — runs after US market close, weekdays only
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # allow manual trigger from the GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write # required for gh release upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install refresh dependencies
        run: pip install yfinance rich python-dotenv pandas

      - name: Download DB from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download db-latest \
            --repo ${{ github.repository }} \
            --pattern "markets.db.gz" \
            --output markets.db.gz \
            || echo "No existing release asset found — first run, will create."
          if [ -f markets.db.gz ]; then
            gunzip markets.db.gz
            echo "Decompressed markets.db ($(du -sh markets.db | cut -f1))"
          fi

      - name: Run daily refresh
        working-directory: backend
        env:
          DB_PATH: ${{ github.workspace }}/markets.db
        run: python -m data.daily_refresh

      - name: Compress and upload DB to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gzip -k markets.db
          gh release view db-latest --repo ${{ github.repository }} > /dev/null 2>&1 \
            || gh release create db-latest \
                --repo ${{ github.repository }} \
                --title "DB: latest" \
                --notes "Auto-updated daily by GitHub Actions." \
                --prerelease
          gh release upload db-latest markets.db.gz \
            --repo ${{ github.repository }} \
            --clobber

      - name: Trigger Render sync
        if: success()
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -n "$RENDER_APP_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${RENDER_APP_URL}/admin/sync" \
              -H "X-Sync-Secret: ${SYNC_SECRET}")
            echo "Render sync response: $STATUS"
          fi
